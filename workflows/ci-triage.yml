# 每日 CI 分诊 — 自动发现并修复 CI 失败
name: Daily CI Triage

on:
  schedule:
    # 每天早上 7:30 (UTC+8 = 北京时间 7:30)
    - cron: "30 23 * * *"
  workflow_dispatch:  # 手动触发

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CI Triage Loop
        run: |
          echo "=== CI Triage Loop Start ==="
          echo "Date: $(date)"
          echo "Branch: ${{ github.ref_name }}"
          
          # 调用 Claude Code 的 /loop 命令
          # 注意：需要配置 ANTHROPIC_API_KEY 在 GitHub Secrets 中
          # claude-code --model claude-sonnet-4-20250514 \
          #   --prompt "/loop Run the ci-triage skill on yesterday's CI failures and open PRs for fixes"

      - name: Write Triage Report
        run: |
          cat >> .github/loop/STATE.md << 'EOF'
          
          ## $(date +%Y-%m-%d) CI Triage
          - [ ] 检查 CI 失败
          - [ ] 分类问题
          - [ ] 自动修复（如可能）
          - [ ] 打开 PR 或记录待处理
          EOF

  auto-fix:
    needs: triage
    runs-on: ubuntu-latest
    if: false  # 先设为 false，等验证通过后改为 true
    steps:
      - uses: actions/checkout@v4
      
      - name: Auto-fix Simple Issues
        run: |
          echo "Auto-fixing simple CI issues..."
          # claude-code --worktree auto-fix \
          #   --prompt "/goal fix all auto-fixable CI issues and ensure tests pass"
