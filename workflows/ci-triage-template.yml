# 复制此文件到你的项目仓库: your-project/.github/workflows/ci-triage.yml
# 
# 支持的项目：
#   - web/             → 推送到 web 仓库
#   - jetlinks-community/ → 推送到 jetlinks-community 仓库
#   - insight/trigger-server/ → 推送到 insight 仓库
#
# 前置条件：
#   1. 在项目仓库 Settings → Secrets 中添加 OPENAI_API_KEY (DeepSeek API Key)
#   2. Skills 仓库已 clone 到 .github/ (git clone git@github.com:gottaBoy/my-skills.git .github)

name: Daily CI Triage

on:
  schedule:
    - cron: "30 23 * * *"    # 每天早上 7:30 北京时间 — 改成适合你项目的时间
  workflow_dispatch:          # 手动触发

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 拉取 Skills 仓库（菜谱）
      - name: Load Skills
        run: |
          git clone --depth 1 https://github.com/gottaBoy/my-skills.git /tmp/skills
          cp -r /tmp/skills/skills/ci-triage /tmp/skills/skills/code-fixer ./skills/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: 🔍 Run CI Triage (DeepSeek)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SKILLS_DIR: /tmp/skills/skills  # 菜谱位置
        run: |
          # ${{ github.workspace }} = 业务项目根目录 (如 web/, jetlinks-community/)
          # /tmp/skills/ = Skills 仓库的菜谱
          echo "🏠 业务仓库: ${{ github.workspace }}"
          echo "📖 菜谱来源: /tmp/skills/"
          python /tmp/skills/scripts/loop_runner.py triage --repo ${{ github.workspace }}

      - name: 📄 Commit Report
        run: |
          cp /tmp/skills/loop/triage_report_*.md ./docs/ 2>/dev/null || true
          git config user.name "ci-bot"
          git config user.email "ci-bot@autodrive.dev"
          git add docs/
          git commit -m "ci: daily triage report $(date +%Y-%m-%d)" || echo "No changes"
          git push || echo "Push failed"

  auto-fix:
    needs: triage
    runs-on: ubuntu-latest
    if: false  # 验证通过后改为 true
    steps:
      - uses: actions/checkout@v4

      - name: Load Skills
        run: |
          git clone --depth 1 https://github.com/gottaBoy/my-skills.git /tmp/skills

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: 🔧 Auto-Fix (DeepSeek)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SKILLS_DIR: /tmp/skills/skills
        run: python /tmp/skills/scripts/loop_runner.py fix --repo ${{ github.workspace }}

      - name: 📝 Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "fix: auto-fix CI issues [ci-bot]"
          branch: auto-fix/ci
          title: "🤖 Auto-fix: CI issues for ${{ github.repository }}"
          body: "Auto-generated by CI Triage Loop using DeepSeek."
